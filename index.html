
<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Utsho AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-primary: #09090b;
        --bg-secondary: #18181b;
        --bg-tertiary: #27272a;
        --bg-input: #27272a;
        --bg-hover: rgba(39,39,42,0.4);
        --border-primary: #27272a;
        --border-secondary: #3f3f46;
        --border-focus: rgba(99,102,241,0.3);
        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --text-inverse: #09090b;
        --accent: #4f46e5;
        --accent-hover: #4338ca;
        --accent-shadow: rgba(99,102,241,0.2);
        --accent-subtle: rgba(99,102,241,0.1);
        --user-bubble: #4f46e5;
        --user-bubble-shadow: rgba(99,102,241,0.2);
        --bot-bubble: #18181b;
        --bot-bubble-border: #27272a;
        --status-bar: rgba(39,39,42,0.5);
        --status-bar-text: #a1a1aa;
        --scroll-thumb: #27272a;
        --scroll-thumb-hover: #3f3f46;
        --btn-primary: #f4f4f5;
        --btn-primary-text: #09090b;
        --btn-secondary: #27272a;
        --btn-secondary-text: #a1a1aa;
      }
      body {
        font-family: 'Hind Siliguri', 'Inter', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        overflow-x: hidden;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scroll-thumb);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--scroll-thumb-hover);
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .floating-ai {
        animation: float 4s ease-in-out infinite;
      }
      .bangla-text {
        line-height: 1.7;
        word-break: break-word;
        overflow-wrap: break-word;
      }
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "lucide-react": "https://esm.sh/lucide-react@0.468.0",
    "firebase/app": "https://esm.sh/firebase@11.3.1/app",
    "firebase/firestore": "https://esm.sh/firebase@11.3.1/firestore",
    "firebase/auth": "https://esm.sh/firebase@11.3.1/auth",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "firebase/": "https://esm.sh/firebase@^12.8.0/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
